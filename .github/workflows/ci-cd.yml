name: Multi-Runtime CI Quality Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  python-lint:
    name: Python Syntax and Lint Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Flake8 Lint
        run: |
          # We configure flake8 to ignore minor style warnings (like whitespace) 
          # but fail on critical syntax errors (E9, F63, F7, F82)
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  terraform-validate:
    name: Terraform Format and Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check Formatting
        run: terraform fmt -check -recursive
        working-directory: ./terraform

      - name: Validate Configuration
        run: |
          terraform init -backend=false
          terraform validate
        working-directory: ./terraform

  docker-build:
    name: Docker Build and Image Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Local Image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: task-automator:test

      - name: Scan Image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'task-automator:test'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
