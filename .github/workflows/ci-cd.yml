name: CI/CD Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-lint:
    name: Python syntax and lint checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Run Python syntax check
        run: python -m py_compile app.py

      - name: Run flake8 lint
        run: flake8 app.py --max-line-length=100 --show-source --statistics

  terraform-validate:
    name: Terraform format and validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check Terraform formatting
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Initialize Terraform without backend
        working-directory: terraform
        run: terraform init -backend=false

      - name: Validate Terraform configuration
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: dummy
          AWS_SECRET_ACCESS_KEY: dummy
          AWS_REGION: eu-west-2
        run: terraform validate

  docker-build:
    name: Docker build and image scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: cloud-native-task-automator:ci

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: cloud-native-task-automator:ci
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
